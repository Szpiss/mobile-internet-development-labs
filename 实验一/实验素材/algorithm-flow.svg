<svg width="1100" height="1400" viewBox="0 0 1100 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1100" height="1400" fill="#F4F7FD"/>

  <defs>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feOffset dy="8"/>
      <feGaussianBlur stdDeviation="10"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.08 0 0 0 0 0.16 0 0 0 0 0.30 0 0 0 0.14 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2E5AAC"/>
    </marker>
  </defs>

  <rect x="390" y="40" width="320" height="96" rx="26" fill="#2E5AAC" filter="url(#shadow)"/>
  <text x="550" y="100" text-anchor="middle" font-size="36" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#FFFFFF">开始</text>

  <line x1="550" y1="136" x2="550" y2="208" stroke="#2E5AAC" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="250" y="220" width="600" height="124" rx="22" fill="#FFFFFF" stroke="#7EA4F3" stroke-width="4" filter="url(#shadow)"/>
  <text x="550" y="274" text-anchor="middle" font-size="30" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#17356E">输入正整数 N</text>
  <text x="550" y="318" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#4B6089">初始化 factorial = 1，total = 0，i = 1</text>

  <line x1="550" y1="344" x2="550" y2="426" stroke="#2E5AAC" stroke-width="6" marker-end="url(#arrow)"/>

  <polygon points="550,438 760,528 550,618 340,528" fill="#FFF4DD" stroke="#E0A12E" stroke-width="4" filter="url(#shadow)"/>
  <text x="550" y="518" text-anchor="middle" font-size="30" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#7A4A00">i ≤ N ?</text>
  <text x="550" y="556" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#9B6A10">判断是否继续计算下一项阶乘</text>

  <line x1="550" y1="618" x2="550" y2="706" stroke="#2E5AAC" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="584" y="670" font-size="24" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#2E5AAC">是</text>

  <rect x="230" y="720" width="640" height="172" rx="22" fill="#FFFFFF" stroke="#7EA4F3" stroke-width="4" filter="url(#shadow)"/>
  <text x="550" y="782" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#17356E">factorial = factorial × i</text>
  <text x="550" y="828" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#17356E">total = total + factorial</text>
  <text x="550" y="874" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#4B6089">记录“i! = factorial”，然后令 i = i + 1</text>

  <path d="M230 806 C120 806 120 528 326 528" stroke="#2E5AAC" stroke-width="6" fill="none" marker-end="url(#arrow)"/>

  <line x1="760" y1="528" x2="874" y2="528" stroke="#2E5AAC" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="802" y="500" font-size="24" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#2E5AAC">否</text>

  <rect x="860" y="444" width="180" height="168" rx="22" fill="#FFFFFF" stroke="#6DB48B" stroke-width="4" filter="url(#shadow)"/>
  <text x="950" y="506" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#184C30">输出结果</text>
  <text x="950" y="552" text-anchor="middle" font-size="21" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#466C56">显示每项阶乘</text>
  <text x="950" y="588" text-anchor="middle" font-size="21" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#466C56">和最终累加和</text>

  <line x1="950" y1="612" x2="950" y2="930" stroke="#2E5AAC" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="790" y="952" width="300" height="96" rx="26" fill="#1E8B5D" filter="url(#shadow)"/>
  <text x="940" y="1014" text-anchor="middle" font-size="36" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#FFFFFF">结束</text>
</svg>
